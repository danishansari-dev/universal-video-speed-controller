# Why this exists:
# Automates the deployment of the marketing landing pages to GitHub Pages.
# It triggers on every push to the 'main' branch if changes are made within the 'docs/' folder,
# uploading and deploying the static website files securely and automatically.

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
  # Allows triggering the deployment manually from the Actions tab on GitHub
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs in progress for newer pushes
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages Configurations
        uses: actions/configure-pages@v5

      - name: Upload Static Website Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploy only the docs directory containing the marketing site files
          path: 'docs'

      - name: Deploy Static Site to Pages
        id: deployment
        uses: actions/deploy-pages@v4
